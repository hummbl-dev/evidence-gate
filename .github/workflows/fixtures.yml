name: Evidence-Gate fixtures

on:
  pull_request:
    paths:
      - "rules/**/*.toml"
      - "scripts/**/*.py"
      - "docs/**/*.md"
      - ".github/workflows/fixtures.yml"
  push:
    branches:
      - main
    paths:
      - "rules/**/*.toml"
      - "scripts/**/*.py"
      - "docs/**/*.md"
      - ".github/workflows/fixtures.yml"

jobs:
  fixtures:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run rule fixtures
        run: python scripts/run_rule_fixtures.py
