name: Evidence-Gate validation

on:
  pull_request:
    paths:
      - "rules/**/*.toml"
      - "scripts/**/*.py"
      - "docs/**/*.md"
      - ".github/workflows/fixtures.yml"
  push:
    branches:
      - main
    paths:
      - "rules/**/*.toml"
      - "scripts/**/*.py"
      - "docs/**/*.md"
      - ".github/workflows/fixtures.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile fixture harness
        run: python -m py_compile scripts/run_rule_fixtures.py

      - name: Exercise fixture harness without private loader
        run: python scripts/run_rule_fixtures.py --skip-missing-loader

      - name: Parse rule TOML files
        shell: python
        run: |
          import tomllib
          from pathlib import Path

          for path in sorted(Path("rules").glob("*.toml")):
              with path.open("rb") as handle:
                  tomllib.load(handle)
              print(f"parsed {path}")
